<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIST || HTML</title>
</head>

<body>



    <h1>Unordered List</h1>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>




    <h1>Ordered List</h1>
    <ol type="I">
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ol>



    


    <h1>Nested Lists</h1>
    <ol>

        <li>Frontend
            <ol type="I">
                <li>HTML</li>
                <li>CSS</li>
                <li>JavaScript</li>
            </ol>
        </li>

        <li>Backend
            <ul>
                <li>Node.js</li>
                <li>Django</li>
            </ul>
        </li>


        <li>Database
            <ol>
                <li>MySQL</li>
                <li>MongoDB</li>
            </ol>
        </li>

    </ol>







</body>

</html>
