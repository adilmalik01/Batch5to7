<body>


    <table border="1">

        <tr>

           <th>City</th>
           <th>Position</th>
        </tr>

        <tr>
            <td>Adil</td>
            <td>20</td>

        <tr>
            <td>Adil</td>
            <td>20</td>

    </table>

        <tr>
            <th>Col 1</th>
            <th>Col 2</th>
            <th>Col 3</th>
        </tr>


        <tr>
            <td rowspan="2">Row 1 Cell 1</td>
            <td>Row 1 Cell 2</td>
            <td>Row 1 Cell 3</td>
        </tr>

        <tr>
            <td>Row 2 Cell 2</td>
            <td>Row 2 Cell 3</td>

        <tr>

        </tr>

    </table>
